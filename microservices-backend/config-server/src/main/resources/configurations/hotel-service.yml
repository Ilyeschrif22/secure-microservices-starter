server:
  port: 8084

spring:
  application:
    name: hotel-service

  cloud:
    config:
      enabled: true

  h2:
    console:
      enabled: true
      path: /h2-console

  datasource:
    username: db
    password: ""
    url: jdbc:h2:file:./Database/Data/db
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.H2Dialect

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/microservices-realm

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true

logging:
  level:
    org.springframework.security: DEBUG